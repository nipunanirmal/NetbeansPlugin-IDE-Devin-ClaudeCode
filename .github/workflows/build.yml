name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: temurin

jobs:
  calc_ver:
    runs-on: ubuntu-latest
    outputs:
      project_ver: ${{ steps.ver.outputs.project_ver }}
      release_flag: ${{ steps.ver.outputs.release_flag }}
      release_tag: ${{ steps.ver.outputs.release_tag }}
      release_upload_url: ${{ steps.ver.outputs.release_upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Auto-tag on any branch
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          # Create base tag (MAJOR.MINOR) from pom.xml if not exists
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-.*//')
          MM=$(echo "$POM_VERSION" | cut -d. -f1-2)
          if ! git tag | grep -q "^${MM}$"; then
            git tag "$MM"
            git push origin "$MM"
            echo "Created base tag: $MM"
          fi

      - name: Calculate version
        id: ver
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --prune --tags
          # Auto-create release tag on every push (branch-name + build number)
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g')
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-.*//')
          MM=$(echo "$POM_VERSION" | cut -d. -f1-2)
          # Count commits since base tag for build number
          BASE_TAG=$(git tag | grep -E "^${MM}$" | sort -V | tail -1 || echo "")
          if [[ -n "$BASE_TAG" ]]; then
            BUILD_NUM=$(git rev-list "${BASE_TAG}..HEAD" --count 2>/dev/null || echo "0")
          else
            BUILD_NUM=$(git rev-list --count HEAD)
          fi
          REL_TAG="${MM}.${BUILD_NUM}-${BRANCH}"
          VER="$REL_TAG"
          RELEASE=ON
          # Create or update release
          if ! gh release view "$REL_TAG" --json id -q .id &>/dev/null; then
            NOTES=RELNOTES.md
            [[ -f "$NOTES" ]] || echo "Release $VER" > "$NOTES"
            gh release create "$REL_TAG" --draft --title "$VER" --notes-file "$NOTES" || true
          fi
          UPLOAD_URL=$(gh release view "$REL_TAG" --json uploadUrl -q .uploadUrl 2>/dev/null || echo "")
          # Check for manual release tag on current commit (takes precedence)
          MANUAL_TAG=$(git tag --points-at HEAD | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true)
          if [[ -n "$MANUAL_TAG" ]]; then
            REL_TAG="$MANUAL_TAG"
            VER="$REL_TAG"
            if ! gh release view "$REL_TAG" --json id -q .id &>/dev/null; then
              NOTES=RELNOTES.md
              [[ -f "$NOTES" ]] || echo "Release $VER" > "$NOTES"
              gh release create "$REL_TAG" --draft --title "$VER" --notes-file "$NOTES" || true
            fi
            UPLOAD_URL=$(gh release view "$REL_TAG" --json uploadUrl -q .uploadUrl 2>/dev/null || echo "")
          fi
          echo "project_ver=$VER" >> $GITHUB_OUTPUT
          echo "release_flag=$RELEASE" >> $GITHUB_OUTPUT
          echo "release_tag=$REL_TAG" >> $GITHUB_OUTPUT
          echo "release_upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
          echo "Version: $VER (release=$RELEASE)"

  build:
    needs: calc_ver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      - name: Set version
        run: mvn versions:set -DnewVersion=${{ needs.calc_ver.outputs.project_ver }} --batch-mode
      - name: Build and test
        # xvfb-run provides a virtual display so Swing UI tests don't throw HeadlessException
        run: xvfb-run mvn package --batch-mode
      - name: Upload artifact and release asset
        uses: nanoufo/action-upload-artifacts-and-release-assets@v2
        with:
          path: |
            target/*.nbm
          upload-release-files: ${{ needs.calc_ver.outputs.release_flag == 'ON' }}
          release-upload-url: ${{ needs.calc_ver.outputs.release_upload_url }}

  release:
    needs: [calc_ver, build]
    if: needs.calc_ver.outputs.release_flag == 'ON'
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REL_TAG="${{ needs.calc_ver.outputs.release_tag }}"
          IS_DRAFT=$(gh release view "$REL_TAG" --json isDraft -q .isDraft 2>/dev/null || echo "true")
          if [[ "$IS_DRAFT" == "false" ]]; then
            echo "GitHub Release already published."
          else
            gh release edit "$REL_TAG" --draft=false --repo ${{ github.repository }}
          fi


